name: CI

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Coverage
        if: matrix.node == 22
        run: npm run coverage
