name: Publish to npm

# Publishes to npm in two ways, both gated by lint+test:
#   1. Push to `main` — publishes ONLY if package.json's version isn't already
#      on npm. So you release by bumping the version in a commit
#      (e.g. `npm version minor`); a push without a bump just skips, no error.
#   2. Push a `v*` tag — the classic explicit release (tag must match the
#      package.json version).
# The version guard makes both safe: npm never sees a duplicate version.

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # No-op for zero-runtime-dep repos; installs the runtime deps for
        # repos that have any (e.g. llms-txt-generator's fast-xml-parser).
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Syntax check
        run: npm run lint

      - name: Run tests
        run: node --test test/*.js

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Is this version already on npm?
        id: ver
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION is already published — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.ver.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
